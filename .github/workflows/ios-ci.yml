name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List simulators
        run: xcrun simctl list devices available
        
        - name: Build and test
          run: |
            xcodebuild test \
              -project FinanceFlow.xcodeproj \
              -scheme FinanceFlow \
              -destination 'id=4CAE0F50-248B-4738-A684-2B454F8B1323' \
              -enableCodeCoverage YES
