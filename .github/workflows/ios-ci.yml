name: iOS CI

on:
  tag:
    branches:
      - main
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show available schemes
        run: xcodebuild -list -project FinanceFlow.xcodeproj

      - name: Build and test
        run: |
          xcodebuild test \
            -project FinanceFlow.xcodeproj \
            -scheme FinanceFlow \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -enableCodeCoverage YES
